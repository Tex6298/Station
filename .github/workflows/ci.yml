name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Studio UI behavior tests
        run: pnpm test:studio-ui

      - name: Developer Spaces smoke tests
        run: pnpm test:developer-spaces

      - name: Projects API smoke tests
        run: pnpm test:projects

      - name: API build
        run: pnpm --filter @station/api build

      - name: Public Spaces smoke tests
        run: pnpm test:spaces

      - name: Continuity smoke tests
        run: pnpm test:continuity

      - name: Persona runtime context tests
        run: pnpm test:persona-context

      - name: Conversation archive tests
        run: pnpm test:conversation-archive

      - name: Continuity publication tests
        run: pnpm test:continuity-publication

      - name: Document discussion tests
        run: pnpm test:document-discussions

      - name: Export trust tests
        run: pnpm test:exports

      - name: Full build
        run: pnpm build
